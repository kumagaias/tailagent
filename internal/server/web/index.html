<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>tailagent</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/app.css">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="logo">t</div><div><strong>tailagent</strong><small>local agent workspace</small></div></div>
    <nav id="nav"></nav>
    <div class="summary"><strong>tailagent</strong><span id="summary">Loading...</span></div>
  </aside>
  <main>
    <header class="topbar"><div><h1 id="title"></h1><p id="subtitle"></p></div><div class="actions" id="actions"></div></header>
    <div id="flash"></div>
    <section id="content"></section>
  </main>
</div>
<div id="backdrop" class="backdrop"></div>
<aside id="drawer" class="drawer"><div class="drawer-head"><button class="close" data-close>&times;</button><h2 id="drawerTitle"></h2><p id="drawerSubtitle"></p></div><div class="drawer-body" id="drawerBody"></div></aside>
<div id="modalBackdrop" class="modal-backdrop">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <h2 id="modalTitle"></h2>
    <p id="modalMessage"></p>
    <div class="form-actions">
      <button class="danger" id="modalConfirm">Delete</button>
      <button id="modalCancel">Cancel</button>
    </div>
  </div>
</div>
<script src="/app.js"></script>
</body>
</html>
